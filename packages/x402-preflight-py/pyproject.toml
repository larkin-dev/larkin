[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "preflight-x402"
version = "0.0.1"
description = "Python SDK for Preflight — wallet authorization for x402-paid APIs."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["x402", "preflight", "agent", "wallet", "authorization"]
authors = [{ name = "Preflight" }]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "httpx>=0.27",
  "pynacl>=1.5",
]

[project.urls]
Homepage = "https://preflight.dev"
Repository = "https://github.com/preflight-dev/preflight"

[tool.hatch.build.targets.wheel]
packages = ["src/preflight_x402"]
