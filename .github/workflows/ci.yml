name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # Version is taken from package.json's `packageManager` field.
        # Do NOT also specify `version:` here — pnpm/action-setup errors
        # with ERR_PNPM_BAD_PM_VERSION when both are set.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the MIT packages under /packages so their dist/ exists before
      # typecheck runs. Their package.json exports maps point exclusively at
      # ./dist/*.js|.d.ts (the shape consumers see when installed from npm),
      # so tests/x402-demo cannot resolve `@larkinsh/x402/next` without a
      # prior build. Scoped to ./packages/* so this step does NOT trigger
      # `next build` on app/ or tests/x402-demo/ (those need env vars and
      # aren't the point of CI's typecheck gate).
      - name: Build workspace packages
        run: pnpm --filter './packages/*' build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
