version: 2
updates:
  # npm — root workspace
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5

  # npm — Next.js app
  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5

  # npm — @larkin/x402 SDK
  - package-ecosystem: npm
    directory: "/packages/x402-larkin"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5

  # npm — @larkin/verify
  - package-ecosystem: npm
    directory: "/packages/x402-larkin-verify"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5

  # npm — @larkin/mcp
  - package-ecosystem: npm
    directory: "/packages/x402-larkin-mcp"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5
